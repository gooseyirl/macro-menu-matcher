<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Macro Menu Matcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Macro Menu Matcher</h1>
            <p class="subtitle">Set a minimum or maximum for each macro, then find fast food that fits.</p>
        </header>

        <main>
            <form id="macro-form">
                <div class="restaurant-filter">
                    <h2 class="section-label">Restaurants</h2>
                    <div id="chain-checkboxes">
                        <!-- populated by app.js -->
                    </div>
                </div>

                <div class="filters-grid">

                    <div class="filter-card" data-macro="kcal">
                        <div class="card-header">
                            <h2>Calories <span class="unit">kcal</span></h2>
                            <div class="mode-toggle">
                                <button type="button" class="mode-btn active" data-mode="min">Min</button>
                                <button type="button" class="mode-btn" data-mode="max">Max</button>
                            </div>
                        </div>
                        <div class="slider-row">
                            <input type="range" class="slider" min="0" max="4000" step="50" value="0">
                        </div>
                        <div class="slider-value-row">
                            <span class="slider-min-label">0</span>
                            <span class="slider-value">0 kcal</span>
                            <span class="slider-max-label">4000</span>
                        </div>
                    </div>

                    <div class="filter-card" data-macro="protein">
                        <div class="card-header">
                            <h2>Protein <span class="unit">g</span></h2>
                            <div class="mode-toggle">
                                <button type="button" class="mode-btn active" data-mode="min">Min</button>
                                <button type="button" class="mode-btn" data-mode="max">Max</button>
                            </div>
                        </div>
                        <div class="slider-row">
                            <input type="range" class="slider" min="0" max="300" step="5" value="0">
                        </div>
                        <div class="slider-value-row">
                            <span class="slider-min-label">0</span>
                            <span class="slider-value">0g</span>
                            <span class="slider-max-label">300</span>
                        </div>
                    </div>

                    <div class="filter-card" data-macro="carbs">
                        <div class="card-header">
                            <h2>Carbohydrates <span class="unit">g</span></h2>
                            <div class="mode-toggle">
                                <button type="button" class="mode-btn active" data-mode="min">Min</button>
                                <button type="button" class="mode-btn" data-mode="max">Max</button>
                            </div>
                        </div>
                        <div class="slider-row">
                            <input type="range" class="slider" min="0" max="500" step="10" value="0">
                        </div>
                        <div class="slider-value-row">
                            <span class="slider-min-label">0</span>
                            <span class="slider-value">0g</span>
                            <span class="slider-max-label">500</span>
                        </div>
                    </div>

                    <div class="filter-card" data-macro="fat">
                        <div class="card-header">
                            <h2>Fat <span class="unit">g</span></h2>
                            <div class="mode-toggle">
                                <button type="button" class="mode-btn active" data-mode="min">Min</button>
                                <button type="button" class="mode-btn" data-mode="max">Max</button>
                            </div>
                        </div>
                        <div class="slider-row">
                            <input type="range" class="slider" min="0" max="200" step="5" value="0">
                        </div>
                        <div class="slider-value-row">
                            <span class="slider-min-label">0</span>
                            <span class="slider-value">0g</span>
                            <span class="slider-max-label">200</span>
                        </div>
                    </div>

                    <div class="filter-card" data-macro="fibre">
                        <div class="card-header">
                            <h2>Fibre <span class="unit">g</span></h2>
                            <div class="mode-toggle">
                                <button type="button" class="mode-btn active" data-mode="min">Min</button>
                                <button type="button" class="mode-btn" data-mode="max">Max</button>
                            </div>
                        </div>
                        <div class="slider-row">
                            <input type="range" class="slider" min="0" max="60" step="1" value="0">
                        </div>
                        <div class="slider-value-row">
                            <span class="slider-min-label">0</span>
                            <span class="slider-value">0g</span>
                            <span class="slider-max-label">60</span>
                        </div>
                    </div>

                </div>

                <div class="actions">
                    <button type="submit" id="search-btn" disabled>Find Matches</button>
                    <button type="button" id="clear-btn">Clear All</button>
                </div>
            </form>

            <section id="results" hidden>
                <h2 id="results-heading"></h2>
                <div id="results-list"></div>
            </section>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
